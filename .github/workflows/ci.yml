name: Pull Request Quality Gate
 
on:
  pull_request:
    branches: [ main ]
 
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice modificato
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608
        with:
          fetch-depth: 0
 
      - name: Configurazione PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.2'
 
      - name: Linting sintattico incrementale
        run: |
          for file in $(git diff --name-only origin/main...HEAD | grep '\.php$'); do
            if [ -f "$file" ]; then php -l "$file"; fi
          done
 
      - name: Installazione Semgrep
        run: python3 -m pip install semgrep
 
      - name: Analisi statica con Semgrep (SAST)
        run: semgrep scan --config p/default --config p/php --config p/owasp-top-ten --error